name: Container image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to package (e.g. v0.1.15)"
        required: true
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "v=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.v }}
          push: true
          tags: |
            ghcr.io/novaheadend/nova-core:${{ steps.ver.outputs.v }}
            ghcr.io/novaheadend/nova-core:latest
